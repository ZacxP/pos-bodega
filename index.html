<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Bodega Scanner</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding-bottom: 110px; }
        .tabs { display: flex; background: #1e1e1e; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; font-size: 13px; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; background: #252525; }
        .content { padding: 10px; display: none; }
        .content.active { display: block; }

        /* BUSCADOR Y ESCÁNER */
        .search-container { display: flex; gap: 5px; margin-bottom: 10px; }
        .search-input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .scanner-btn { background: #007bff; border: none; border-radius: 8px; width: 50px; color: white; font-size: 1.2em; }

        /* GRID */
        .productos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .prod-btn { background: #2a2a2a; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 8px; border: 1px solid #333; position: relative; aspect-ratio: 1/1.1; }
        .prod-btn .badge { position: absolute; top: 4px; right: 4px; background: #007bff; font-size: 9px; padding: 2px 5px; border-radius: 4px; }
        .prod-btn .name { font-size: 11px; font-weight: bold; margin-bottom: 3px; }
        .prod-btn .bs { font-size: 10px; color: #28a745; font-weight: bold; }

        /* MODAL CÁMARA */
        #reader { width: 100% !important; border-radius: 15px; overflow: hidden; display: none; margin-bottom: 15px; }

        /* BARRA INFERIOR */
        .ticket-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e1e1e; border-top: 2px solid #333; padding: 12px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 150; }
        .btn-cobrar { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; }

        /* ESTILOS DE FORMULARIO */
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-blue { background: #007bff; color: white; }

        /* MODAL CARRITO */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e1e1e; width: 90%; border-radius: 15px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .item-carrito { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="tab-vender" class="tab-btn active" onclick="openTab('vender')">VENTA</button>
        <button id="tab-stock" class="tab-btn" onclick="openTab('stock')">STOCK</button>
        <button id="tab-tasa" class="tab-btn" onclick="openTab('tasa')">TASA</button>
    </div>

    <div id="vender" class="content active">
        <div class="search-container">
            <input type="text" id="codigoBusqueda" class="search-input" placeholder="Escanear o buscar código..." onchange="buscarPorCodigo(this.value)">
            <button class="scanner-btn" onclick="activarCamara('vender')">📷</button>
        </div>
        
        <div id="reader"></div> <div id="gridProductos" class="productos-grid"></div>
    </div>

    <div id="stock" class="content">
        <div style="background:#1e1e1e; padding:15px; border-radius:10px; margin-bottom:20px;">
            <h3>📦 Registrar Producto</h3>
            <div style="display:flex; gap:5px;">
                <input type="text" id="codigoP" placeholder="Código de barras">
                <button onclick="activarCamara('stock')" style="background:#444; border:none; border-radius:6px; width:45px;">📷</button>
            </div>
            <input type="text" id="nombreP" placeholder="Nombre (Ej: Harina)">
            <input type="number" id="precioP" step="0.01" placeholder="Precio USD $">
            <input type="number" id="stockP" placeholder="Cantidad Inicial">
            <button class="main-btn btn-blue" onclick="guardarProducto()">Guardar Producto</button>
        </div>
        <div id="listaInventario"></div>
    </div>

    <div id="tasa" class="content">
        <h3>💹 Tasa del día (Bs.)</h3>
        <input type="number" id="tasaInput" step="0.01">
        <button class="main-btn btn-blue" onclick="actualizarTasa()">Actualizar</button>
    </div>

    <div id="ticketBar" class="ticket-bar" style="display:none;">
        <div onclick="toggleModal()">
            <div style="font-weight:bold;">Total: $<span id="totalUSD">0.00</span></div>
            <div id="totalBS" style="color:#28a745; font-size:0.9em;">Bs 0,00</div>
        </div>
        <button class="btn-cobrar" onclick="finalizarVenta()">COBRAR</button>
    </div>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <h3>Lista de Compra</h3>
            <div id="itemsCarrito"></div>
            <button class="main-btn btn-blue" onclick="toggleModal()">VOLVER</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDbbeyN6DJ2LTbP04x6MJ2CeZ...", 
            authDomain: "pos-bodega-a6a46.firebaseapp.com",
            projectId: "pos-bodega-a6a46",
            storageBucket: "pos-bodega-a6a46.firebasestorage.app",
            messagingSenderId: "899759487177",
            appId: "1:899759487177:web:b1eec7a5accde...",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tasaGlobal = 1;
        let carrito = [];
        let html5QrCode;

        // Gestión de Pestañas
        function openTab(tabId) {
            if(html5QrCode) { html5QrCode.stop(); document.getElementById("reader").style.display="none"; }
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // --- SISTEMA DE CÁMARA ---
        function activarCamara(modo) {
            const readerDiv = document.getElementById("reader");
            readerDiv.style.display = "block";
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Sonido de Bip
                const audio = new Audio('https://www.soundjay.com/button/beep-07.wav');
                audio.play();

                if(modo === 'stock') {
                    document.getElementById("codigoP").value = decodedText;
                } else {
                    buscarPorCodigo(decodedText);
                }
                
                html5QrCode.stop();
                readerDiv.style.display = "none";
            });
        }

        // Buscar en Firebase por Código de Barras
        function buscarPorCodigo(codigo) {
            if(!codigo) return;
            db.collection("productos").where("codigo", "==", codigo).get().then(snap => {
                if(!snap.empty) {
                    const doc = snap.docs[0];
                    const p = doc.data();
                    agregarCarrito(doc.id, p.nombre, p.precio, p.stock);
                    document.getElementById("codigoBusqueda").value = "";
                } else {
                    alert("Producto no registrado con ese código: " + codigo);
                }
            });
        }

        // --- FUNCIONES CORE ---
        db.collection("config").doc("moneda").onSnapshot(doc => {
            if(doc.exists) {
                tasaGlobal = doc.data().valor;
                document.getElementById("tasaInput").value = tasaGlobal;
                cargarDatos();
            }
        });

        function cargarDatos() {
            db.collection("productos").onSnapshot(snap => {
                const grid = document.getElementById("gridProductos");
                const listaInv = document.getElementById("listaInventario");
                grid.innerHTML = ""; listaInv.innerHTML = "";

                snap.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    const precioBs = (p.precio * tasaGlobal).toLocaleString('es-VE', {minimumFractionDigits:2});

                    if(p.stock > 0) {
                        grid.innerHTML += `
                            <div class="prod-btn" onclick="agregarCarrito('${id}', '${p.nombre}', ${p.precio}, ${p.stock})">
                                <span class="badge">${p.stock}</span>
                                <span class="name">${p.nombre}</span>
                                <span class="bs">Bs ${precioBs}</span>
                            </div>`;
                    }
                    listaInv.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">${p.nombre} - Stock: ${p.stock}</div>`;
                });
            });
        }

        function agregarCarrito(id, nombre, precio, stockMax) {
            const yaEnCarrito = carrito.filter(i => i.id === id).length;
            if(yaEnCarrito >= stockMax) return alert("Sin stock");
            carrito.push({id, nombre, precio});
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            document.getElementById("ticketBar").style.display = carrito.length > 0 ? "flex" : "none";
            document.getElementById("totalUSD").innerText = total.toFixed(2);
            document.getElementById("totalBS").innerText = "Bs " + (total * tasaGlobal).toLocaleString('es-VE', {minimumFractionDigits:2});
            
            const cont = document.getElementById("itemsCarrito");
            cont.innerHTML = "";
            carrito.forEach(i => cont.innerHTML += `<div class="item-carrito"><span>${i.nombre}</span><span>$${i.precio}</span></div>`);
        }

        async function finalizarVenta() {
            if(!confirm("¿Cobrar?")) return;
            for(const item of carrito) {
                const ref = db.collection("productos").doc(item.id);
                const d = await ref.get();
                await ref.update({ stock: d.data().stock - 1 });
            }
            alert("Venta Exitosa");
            carrito = []; actualizarInterfaz();
        }

        async function guardarProducto() {
            const c = document.getElementById("codigoP").value;
            const n = document.getElementById("nombreP").value;
            const p = parseFloat(document.getElementById("precioP").value);
            const s = parseInt(document.getElementById("stockP").value);
            await db.collection("productos").add({codigo: c, nombre: n, precio: p, stock: s});
            alert("Guardado");
            document.getElementById("codigoP").value = "";
            document.getElementById("nombreP").value = "";
        }

        function toggleModal() { document.getElementById("modalCarrito").classList.toggle("active"); }
        async function actualizarTasa() {
            const v = parseFloat(document.getElementById("tasaInput").value);
            await db.collection("config").doc("moneda").set({valor: v});
        }
    </script>
</body>
</html>
