<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Bodega Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        .tabs { display: flex; background: #1e1e1e; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; background: #252525; }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        
        /* CUADRADOS DE PRODUCTOS */
        .productos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .prod-btn { background: #333; color: white; aspect-ratio: 1 / 1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 10px; cursor: pointer; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .prod-btn:active { transform: scale(0.95); background: #444; }
        .prod-btn .name { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .prod-btn .price { font-size: 0.9em; color: #bbb; }

        /* BARRA INFERIOR */
        .ticket-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e1e1e; border-top: 2px solid #333; padding: 12px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 150; }
        .total-info { flex: 1; cursor: pointer; }
        .total-text { font-size: 1.2em; font-weight: bold; }
        .total-bs { color: #28a745; font-size: 0.9em; }
        .btn-cobrar { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e1e1e; width: 90%; max-width: 400px; border-radius: 12px; padding: 20px; max-height: 70vh; overflow-y: auto; }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .btn-del { color: #ff4444; background: none; border: none; font-size: 1.2em; font-weight: bold; padding: 5px 10px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="btn-vender" class="tab-btn active" onclick="openTab('vender')">VENTA</button>
        <button id="btn-stock" class="tab-btn" onclick="openTab('stock')">STOCK</button>
        <button id="btn-tasa" class="tab-btn" onclick="openTab('tasa')">TASA</button>
        <button id="btn-cierre" class="tab-btn" onclick="openTab('cierre')">CIERRE</button>
    </div>

    <div id="vender" class="content active">
        <h3>🛒 Productos</h3>
        <div id="gridProductos" class="productos-grid"></div>
    </div>

    <div id="stock" class="content">
        <div style="background:#1e1e1e; padding:15px; border-radius:10px; border:1px solid #333;">
            <h3>📦 Agregar Producto</h3>
            <input type="text" id="nombreP" placeholder="Nombre (Ej: Harina)">
            <input type="number" id="precioP" step="0.01" placeholder="Precio USD $">
            <input type="number" id="stockP" placeholder="Cantidad Inicial">
            <button class="main-btn btn-blue" onclick="guardarProducto()">Guardar Artículo</button>
        </div>
        <h3 style="margin-top:20px;">📋 Inventario Actual</h3>
        <div id="listaInventario"></div>
    </div>

    <div id="tasa" class="content">
        <div style="background:#1e1e1e; padding:15px; border-radius:10px; border:1px solid #333;">
            <h3>💹 Configurar Tasa</h3>
            <p>Tasa actual en Bs:</p>
            <input type="number" id="tasaInput" step="0.01">
            <button class="main-btn btn-blue" onclick="actualizarTasa()">Actualizar Tasa</button>
        </div>
    </div>

    <div id="cierre" class="content">
        <h3>📄 Últimas Ventas</h3>
        <div id="historialVentas"></div>
    </div>

    <div id="ticketBar" class="ticket-bar" style="display:none;">
        <div class="total-info" onclick="toggleModal()">
            <div class="total-text">Total: $<span id="totalUSD">0.00</span></div>
            <div class="total-bs">Bs. <span id="totalBS">0,00</span></div>
            <small>Ver lista (<span id="countItems">0</span> items)</small>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="confirmarVaciar()" style="background:none; border:none; color:#777; font-size:1.5em;">🗑️</button>
            <button class="btn-cobrar" onclick="finalizarVenta()">COBRAR</button>
        </div>
    </div>

    <div id="modalCarrito" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
                <h3 style="margin:0;">Ticket de Compra</h3>
                <button onclick="toggleModal()" style="background:none; border:none; color:white; font-size:1.5em;">×</button>
            </div>
            <div id="itemsCarrito" style="margin-top:15px;"></div>
            <button class="main-btn btn-blue" onclick="toggleModal()" style="margin-top:20px;">Seguir Agregando</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "AIzaSyDbbeyN6DJ2LTbP04x6MJ2CeZ...", // (Asegúrate que esté completa)
            authDomain: "pos-bodega-a6a46.firebaseapp.com",
            projectId: "pos-bodega-a6a46",
            storageBucket: "pos-bodega-a6a46.firebasestorage.app",
            messagingSenderId: "899759487177",
            appId: "1:899759487177:web:b1eec7a5accde...",
            measurementId: "G-M7ZHTQS4KT"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tasaDia = 1;
        let carrito = [];
        const colores = ['#e53935', '#43a047', '#1e88e5', '#8e24aa', '#fb8c00', '#6d4c41'];

        // Función para cambiar pestañas
        function openTab(name) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            document.getElementById('btn-' + name).classList.add('active');
            actualizarBarra();
        }

        // Cargar Tasa
        db.collection("config").doc("moneda").onSnapshot(doc => {
            if(doc.exists) {
                tasaDia = doc.data().valor;
                document.getElementById("tasaInput").value = tasaDia;
                cargarProductos(); 
            }
        });

        async function actualizarTasa() {
            const v = parseFloat(document.getElementById("tasaInput").value);
            if(!v) return;
            await db.collection("config").doc("moneda").set({valor: v});
            alert("Tasa actualizada ✅");
        }

        // Cargar Productos en Cuadrícula
        function cargarProductos() {
            db.collection("productos").onSnapshot(snap => {
                const grid = document.getElementById("gridProductos");
                const lista = document.getElementById("listaInventario");
                grid.innerHTML = "";
                lista.innerHTML = "";

                snap.forEach((doc, index) => {
                    const p = doc.data();
                    const id = doc.id;
                    const precioBs = (p.precio * tasaDia).toLocaleString('de-DE', {minimumFractionDigits:2});
                    const color = colores[index % colores.length];

                    // Venta (Botones grandes)
                    grid.innerHTML += `
                        <div class="prod-btn" style="background-color: ${color};" onclick="agregar('${id}', '${p.nombre}', ${p.precio})">
                            <span class="name">${p.nombre}</span>
                            <span class="price">$${p.precio.toFixed(2)}</span>
                            <span class="total-bs">Bs. ${precioBs}</span>
                        </div>
                    `;

                    // Stock (Lista)
                    lista.innerHTML += `
                        <div style="background:#252525; padding:12px; border-radius:8px; margin-bottom:8px; border:1px solid #333;">
                            <b>${p.nombre}</b><br>
                            $${p.precio.toFixed(2)} | Stock: ${p.stock}
                            <button onclick="eliminarP('${id}')" style="float:right; color:#ff4444; background:none; border:none; font-weight:bold;">BORRAR</button>
                        </div>
                    `;
                });
            });
        }

        // Lógica del Carrito
        function agregar(idDB, nombre, precio) {
            carrito.push({idTemp: Date.now(), idDB, nombre, precio});
            actualizarBarra();
        }

        function actualizarBarra() {
            const bar = document.getElementById("ticketBar");
            const total = carrito.reduce((s, i) => s + i.precio, 0);
            
            if(carrito.length > 0 && document.getElementById('vender').classList.contains('active')) {
                bar.style.display = "flex";
            } else {
                bar.style.display = "none";
            }

            document.getElementById("totalUSD").innerText = total.toFixed(2);
            document.getElementById("totalBS").innerText = (total * tasaDia).toLocaleString('de-DE', {minimumFractionDigits:2});
            document.getElementById("countItems").innerText = carrito.length;
            dibujarModal();
        }

        function dibujarModal() {
            const cont = document.getElementById("itemsCarrito");
            cont.innerHTML = carrito.length === 0 ? "<p style='text-align:center;color:#777;'>El ticket está vacío</p>" : "";
            carrito.forEach(i => {
                cont.innerHTML += `
                    <div class="item-carrito">
                        <span>${i.nombre} ($${i.precio.toFixed(2)})</span>
                        <button class="btn-del" onclick="quitar('${i.idTemp}')">×</button>
                    </div>
                `;
            });
        }

        function quitar(id) {
            carrito = carrito.filter(i => i.idTemp != id);
            actualizarBarra();
        }

        function toggleModal() {
            document.getElementById("modalCarrito").classList.toggle("active");
        }

        function confirmarVaciar() {
            if(confirm("¿Cancelar toda la compra actual?")) {
                carrito = [];
                actualizarBarra();
            }
        }

        // Finalizar Venta (Cobrar)
        async function finalizarVenta() {
            if(carrito.length === 0) return;
            if(!confirm("¿Registrar cobro y descontar stock?")) return;

            const total = carrito.reduce((s, i) => s + i.precio, 0);
            const nombres = carrito.map(i => i.nombre).join(", ");

            try {
                // Registrar venta
                await db.collection("ventas").add({
                    productos: nombres,
                    totalUSD: total,
                    fecha: new Date().toLocaleString('es-VE')
                });

                // Descontar Stock
                for(const item of carrito) {
                    const ref = db.collection("productos").doc(item.idDB);
                    const doc = await ref.get();
                    if(doc.exists) {
                        await ref.update({ stock: doc.data().stock - 1 });
                    }
                }

                alert("Venta registrada con éxito ✅");
                carrito = [];
                actualizarBarra();
                if(document.getElementById("modalCarrito").classList.contains("active")) toggleModal();

            } catch(e) { alert("Error: " + e); }
        }

        // Stock y Cierre
        async function guardarProducto() {
            const n = document.getElementById("nombreP").value;
            const p = parseFloat(document.getElementById("precioP").value);
            const s = parseInt(document.getElementById("stockP").value);
            if(!n || !p) return alert("Completa los datos");
            await db.collection("productos").add({nombre: n, precio: p, stock: s || 0});
            document.getElementById("nombreP").value = "";
            document.getElementById("precioP").value = "";
            document.getElementById("stockP").value = "";
            alert("Producto guardado!");
        }

        async function eliminarP(id) {
            if(confirm("¿Eliminar este producto del sistema?")) await db.collection("productos").doc(id).delete();
        }

        db.collection("ventas").orderBy("fecha", "desc").limit(15).onSnapshot(snap => {
            const div = document.getElementById("historialVentas");
            div.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                div.innerHTML += `
                    <div style="border-bottom:1px solid #333; padding:10px; font-size:0.9em;">
                        <span style="color:#888;">${v.fecha}</span><br>
                        <b>$${v.totalUSD.toFixed(2)}</b> - ${v.productos}
                    </div>
                `;
            });
        });

        // Inicio
        openTab('vender');
    </script>
</body>
</html>
