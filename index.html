<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Bodega Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        .tabs { display: flex; background: #1e1e1e; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; text-align: center; font-size: 13px; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; background: #252525; }
        .content { padding: 10px; display: none; }
        .content.active { display: block; }

        /* CONTROLES DE VISTA */
        .view-controls { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; margin-bottom: 10px; }
        .view-btn { background: #333; border: 1px solid #444; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; }
        .view-btn.active { background: #007bff; border-color: #007bff; }

        /* DISEÑO DE CUADROS COMPACTOS (3 COLUMNAS) */
        .productos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .prod-btn { background: #2a2a2a; color: white; aspect-ratio: 1 / 1.1; border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 5px; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .prod-btn:active { transform: scale(0.95); background: #333; }
        .prod-btn .name { font-weight: bold; font-size: 11px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .prod-btn .price { font-size: 10px; color: #bbb; }
        .prod-btn .bs { font-size: 10px; color: #28a745; font-weight: bold; }

        /* DISEÑO DE LISTA */
        .productos-grid.list-view { display: flex; flex-direction: column; gap: 5px; }
        .productos-grid.list-view .prod-btn { aspect-ratio: auto; height: 60px; flex-direction: row; justify-content: space-between; padding: 0 15px; }
        .productos-grid.list-view .prod-btn .name { font-size: 14px; text-align: left; -webkit-line-clamp: 1; }
        .productos-grid.list-view .prod-btn .details { text-align: right; }

        /* BARRA DE COBRO */
        .ticket-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e1e1e; border-top: 2px solid #333; padding: 12px 15px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 150; }
        .total-info { flex: 1; }
        .total-text { font-size: 1.1em; font-weight: bold; }
        .total-bs { color: #28a745; font-size: 0.9em; font-weight: bold; }
        .btn-cobrar { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; }

        /* FORMULARIOS */
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #2c2c2c; color: white; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="tab-vender" class="tab-btn active" onclick="openTab('vender')">VENTA</button>
        <button id="tab-stock" class="tab-btn" onclick="openTab('stock')">STOCK</button>
        <button id="tab-tasa" class="tab-btn" onclick="openTab('tasa')">TASA</button>
        <button id="tab-cierre" class="tab-btn" onclick="openTab('cierre')">CIERRE</button>
    </div>

    <div id="vender" class="content active">
        <div class="view-controls">
            <span style="font-size: 14px; font-weight: bold;">Catálogo</span>
            <div>
                <button id="btn-grid" class="view-btn active" onclick="setView('grid')">🔳</button>
                <button id="btn-list" class="view-btn" onclick="setView('list')">≡</button>
            </div>
        </div>
        <div id="gridProductos" class="productos-grid"></div>
    </div>

    <div id="stock" class="content">
        <div style="background:#1e1e1e; padding:15px; border-radius:10px;">
            <h3>📦 Nuevo Producto</h3>
            <input type="text" id="nombreP" placeholder="Nombre del producto">
            <input type="number" id="precioP" step="0.01" placeholder="Precio en USD $">
            <input type="number" id="stockP" placeholder="Cantidad en stock">
            <button class="main-btn btn-blue" onclick="guardarProducto()">Guardar</button>
        </div>
        <h3>📋 Inventario</h3>
        <div id="listaInventario"></div>
    </div>

    <div id="tasa" class="content">
        <div style="background:#1e1e1e; padding:15px; border-radius:10px;">
            <h3>💹 Configurar Tasa (Bs.)</h3>
            <input type="number" id="tasaInput" step="0.01">
            <button class="main-btn btn-blue" onclick="actualizarTasa()">Actualizar Tasa</button>
        </div>
    </div>

    <div id="cierre" class="content">
        <h3>📄 Últimas Ventas</h3>
        <div id="historialVentas"></div>
    </div>

    <div id="ticketBar" class="ticket-bar" style="display:none;">
        <div class="total-info">
            <div class="total-text">Total: $<span id="totalUSD">0.00</span></div>
            <div id="totalBS" class="total-bs">Bs 0,00</div>
        </div>
        <button class="btn-cobrar" onclick="finalizarVenta()">COBRAR</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbbeyN6DJ2LTbP04x6MJ2CeZ...", // Asegúrate que esté completa
            authDomain: "pos-bodega-a6a46.firebaseapp.com",
            projectId: "pos-bodega-a6a46",
            storageBucket: "pos-bodega-a6a46.firebasestorage.app",
            messagingSenderId: "899759487177",
            appId: "1:899759487177:web:b1eec7a5accde...",
            measurementId: "G-M7ZHTQS4KT"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tasaGlobal = 1;
        let carrito = [];
        let vistaActual = 'grid';

        // Gestión de Pestañas
        function openTab(tabId) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            actualizarInterfaz();
        }

        // Cambio de Vista
        function setView(view) {
            vistaActual = view;
            const grid = document.getElementById("gridProductos");
            document.getElementById('btn-grid').classList.toggle('active', view === 'grid');
            document.getElementById('btn-list').classList.toggle('active', view === 'list');
            
            if(view === 'list') grid.classList.add('list-view');
            else grid.classList.remove('list-view');
            
            cargarProductos();
        }

        // Tasa en tiempo real
        db.collection("config").doc("moneda").onSnapshot(doc => {
            if(doc.exists) {
                tasaGlobal = doc.data().valor;
                document.getElementById("tasaInput").value = tasaGlobal;
                cargarProductos();
            }
        });

        async function actualizarTasa() {
            const v = parseFloat(document.getElementById("tasaInput").value);
            await db.collection("config").doc("moneda").set({valor: v});
            alert("Tasa actualizada!");
        }

        // Cargar productos
        function cargarProductos() {
            db.collection("productos").onSnapshot(snap => {
                const grid = document.getElementById("gridProductos");
                const inventario = document.getElementById("listaInventario");
                grid.innerHTML = "";
                inventario.innerHTML = "";

                snap.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    const precioBs = (p.precio * tasaGlobal).toLocaleString('es-VE', {minimumFractionDigits:2});

                    if(vistaActual === 'grid') {
                        grid.innerHTML += `
                            <div class="prod-btn" onclick="agregarCarrito('${id}', '${p.nombre}', ${p.precio})">
                                <span class="name">${p.nombre}</span>
                                <span class="price">$${p.precio.toFixed(2)}</span>
                                <span class="bs">Bs ${precioBs}</span>
                            </div>
                        `;
                    } else {
                        grid.innerHTML += `
                            <div class="prod-btn" onclick="agregarCarrito('${id}', '${p.nombre}', ${p.precio})">
                                <span class="name">${p.nombre}</span>
                                <div class="details">
                                    <div class="price">$${p.precio.toFixed(2)}</div>
                                    <div class="bs">Bs ${precioBs}</div>
                                </div>
                            </div>
                        `;
                    }

                    inventario.innerHTML += `
                        <div style="background:#222; padding:10px; margin-top:5px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                            <span><b>${p.nombre}</b> ($${p.precio})</span>
                            <button onclick="eliminarProd('${id}')" style="color:red; background:none; border:none;">Borrar</button>
                        </div>
                    `;
                });
            });
        }

        function agregarCarrito(id, nombre, precio) {
            carrito.push({id, nombre, precio});
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const bar = document.getElementById("ticketBar");
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            
            if(carrito.length > 0 && document.getElementById('vender').classList.contains('active')) {
                bar.style.display = "flex";
            } else {
                bar.style.display = "none";
            }

            document.getElementById("totalUSD").innerText = total.toFixed(2);
            document.getElementById("totalBS").innerText = "Bs " + (total * tasaGlobal).toLocaleString('es-VE', {minimumFractionDigits:2});
        }

        async function finalizarVenta() {
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            await db.collection("ventas").add({
                totalUSD: total,
                fecha: new Date().toLocaleString('es-VE'),
                productos: carrito.map(i => i.nombre).join(", ")
            });
            alert("Cobro registrado");
            carrito = [];
            actualizarInterfaz();
        }

        async function guardarProducto() {
            const n = document.getElementById("nombreP").value;
            const p = parseFloat(document.getElementById("precioP").value);
            const s = parseInt(document.getElementById("stockP").value);
            await db.collection("productos").add({nombre: n, precio: p, stock: s});
            alert("Guardado!");
        }

        async function eliminarProd(id) {
            if(confirm("¿Eliminar producto?")) await db.collection("productos").doc(id).delete();
        }

        // Historial de ventas
        db.collection("ventas").orderBy("fecha", "desc").limit(10).onSnapshot(snap => {
            const div = document.getElementById("historialVentas");
            div.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                div.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">
                    ${v.fecha} - <b>$${v.totalUSD.toFixed(2)}</b>
                </div>`;
            });
        });

        cargarProductos();
    </script>
</body>
</html>
